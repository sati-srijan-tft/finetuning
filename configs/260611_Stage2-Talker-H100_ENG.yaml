### Stage 2: Talker Fine-Tuning — H100 80 GB (HuggingFace, no NeMo)
### Thinker (model.layers.{0..47}, MoE, 30B active params) is frozen in 8-bit.
### Only Talker layers receive LoRA updates.
###
### IMPORTANT — two-step loading required (stage1_merged has NO Talker weights):
###   1. Load full model from 'Qwen/Qwen3-Omni-30B-A3B-Instruct':
###        from transformers import Qwen3OmniMoeForConditionalGeneration
###        full_model = Qwen3OmniMoeForConditionalGeneration.from_pretrained(
###            model_name_or_path,
###            torch_dtype=torch.bfloat16,
###            device_map="auto",
###            attn_implementation="flash_attention_2",
###        )
###   2. Inject Stage 1 Thinker weights:
###        stage1 = torch.load('stage1_merged/pytorch_model*.bin')
###        full_model.load_state_dict(stage1, strict=False)
###      strict=False leaves Talker + code2wav weights from step 1 intact.
###   3. Freeze everything except talker.*:
###        for n, p in full_model.named_parameters():
###            p.requires_grad = n.startswith('talker.')

### Base weights — original HF checkpoint (Talker weights come from here)
model_name_or_path: "./qwen3-omni-full-merged"
model_path: "Qwen/Qwen3-Omni-30B-A3B-Thinking"

### Frozen Thinker quantization (applied to model.layers.* only)
quantization:
  load_in_8bit: true              # ~30 GB — better quality than 4-bit
  llm_int8_threshold: 6.0
  llm_int8_has_fp16_weight: false

### LoRA — Talker only; Thinker and code2wav stay frozen
###
### Module map (confirmed from LOAD REPORT on Qwen/Qwen3-Omni-30B-A3B-Instruct):
###   talker.model.layers.{0..19}          — 20-layer MoE decoder (main Talker)
###   talker.code_predictor.model.layers.{0..4} — 5-layer dense predictor
###   code2wav.*                            — vocoder; keep frozen (not fine-tuned here)
###
### Regex covers both Talker attention stacks. Add code_predictor MLP targets
### (gate_proj|up_proj|down_proj) if VRAM budget allows after profiling.
lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules_regex: "talker\\.(model|code_predictor\\.model)\\.layers\\.\\d+\\.self_attn\\.(q_proj|k_proj|v_proj|o_proj)"

### HuggingFace Trainer hyperparameters
### NOTE: flash_attn must be set in model_kwargs (attn_implementation="flash_attention_2"),
###       not here — TrainingArguments has no flash_attn field.
training:
  output_dir: "./outputs/stage2_talker_h100"
  num_train_epochs: 5
  per_device_train_batch_size: 8   # reduce to 4 if OOM
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4   # effective batch = 32
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_steps: 200
  bf16: true
  tf32: true                       # Hopper TF32 — free throughput
  gradient_checkpointing: false    # H100: disable for ~30% compute gain
  optim: adamw_torch_fused
  logging_steps: 10
  save_steps: 500
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  dataloader_num_workers: 8
  dataloader_pin_memory: true
  ddp_find_unused_parameters: false

### Audio data — TTS manifests for Talker training
data:
  train_manifest: "./manifests/train_manifest.json"
  val_manifest: "./manifests/val_manifest.json"
  sample_rate: 24000               # Qwen Omni native rate (audio is downsampled to 16 kHz internally for CosyVoice2)
  max_duration: 30.0
  min_duration: 0.5
  cosyvoice_repo: "./third_party/CosyVoice"   # path to cloned CosyVoice repo (added to sys.path)
  cosyvoice_path: "./cosyvoice2-0.5b"          # path to downloaded CosyVoice2-0.5B weights
