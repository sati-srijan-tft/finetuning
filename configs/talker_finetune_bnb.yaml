### Stage 2 BnB: Talker Fine-Tuning via HuggingFace (no NeMo)
### Frozen Thinker loaded in 4-bit NF4 ≈ 15 GB — fits a single 24 GB GPU.
### NeMo conversion (05_convert_to_nemo.sh) is NOT needed for this path.
### Uses the Stage 1 merged HF model directly.

### Input model — Stage 1 merged HF checkpoint (output of 04_merge_lora_adapters.sh)
model_path: "./LLaMA-Factory/outputs/stage1_merged"

### 4-bit quantization — Thinker is frozen; BnB keeps it at ~15 GB
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16   # bfloat16 on A100; switch to float16 on consumer GPUs
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true    # nested quantization saves ~0.4 GB extra

### LoRA — applied only to linear layers inside the Talker submodule
lora:
  rank: 8
  alpha: 16
  dropout: 0.05
  # Regex matched against full dotted module names (e.g. "talker.decoder.layers.0.self_attn.q_proj").
  # The pattern below restricts LoRA to layers whose path contains "talker",
  # leaving the Thinker frozen. Adjust the prefix if model inspection shows a different name.
  talker_module_regex: ".*talker.*\\.(q_proj|k_proj|v_proj|o_proj|gate_proj|up_proj|down_proj)"

### HuggingFace Trainer hyperparameters — match effective batch size of the NeMo config (32)
training:
  output_dir: "./outputs/stage2_talker_bnb"
  num_train_epochs: 5
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16    # effective batch = 2 × 16 = 32
  learning_rate: 1.0e-4
  lr_scheduler_type: cosine
  warmup_steps: 200
  bf16: true                         # set to false and fp16: true on non-A100
  gradient_checkpointing: true       # required — reduces activation VRAM at ~30% compute cost
  logging_steps: 10
  save_steps: 500
  load_best_model_at_end: true
  metric_for_best_model: eval_loss
  dataloader_num_workers: 4
  dataloader_pin_memory: true

### Audio data — same manifest format produced by 06_prepare_stage2_manifest.py
data:
  train_manifest: "/path/to/train_manifest.json"
  val_manifest: "/path/to/val_manifest.json"
  sample_rate: 24000    # must match Qwen Omni native rate
  max_duration: 30.0
  min_duration: 0.5
